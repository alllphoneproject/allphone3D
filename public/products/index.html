<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#090b10">
  <title>Allphone 3D Products</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#090b10;color:#f8fafc;font-family:Inter,Segoe UI,Arial,sans-serif}
    main{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:28px;background:linear-gradient(135deg,#090b10,#111827 48%,#18130d)}
    .wrap{width:min(980px,100%);margin:0 auto}
    a.home{color:#94a3b8;text-decoration:none;font-size:12px;font-weight:800;text-transform:uppercase}
    h1{margin:28px 0 10px;font-size:clamp(34px,7vw,72px);line-height:1}
    p{margin:0 0 34px;color:#cbd5e1;max-width:620px;line-height:1.6}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
    .card{min-height:220px;display:flex;flex-direction:column;justify-content:space-between;padding:22px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.28);color:inherit;text-decoration:none}
    .card:hover{border-color:rgba(255,255,255,.35);background:rgba(0,0,0,.42)}
    .brand{font-size:11px;font-weight:900;color:#94a3b8;text-transform:uppercase;letter-spacing:.16em}
    .name{display:block;margin-top:12px;font-size:26px;font-weight:900;line-height:1.05}
    .meta{display:flex;justify-content:space-between;gap:18px;margin-top:28px;padding-top:14px;border-top:1px solid rgba(255,255,255,.12);font-size:12px;font-weight:900;color:#e2e8f0;text-transform:uppercase}
  </style>
</head>
<body>
  <main>
    <div class="wrap">
      <a class="home" href="../">Allphone 3D Home</a>
      <h1>Product Experiences</h1>
      <p>Choose an interactive product model. Each product has a separate path and can evolve independently.</p>
      <section class="grid">
        <a class="card" href="./call-recorder-beetech/">
          <span>
            <span class="brand">BeeTech</span>
            <span class="name">Call Recorder</span>
          </span>
          <span class="meta"><span>Open product</span><span>-&gt;</span></span>
        </a>
        <a class="card" href="./xtrike-me-gp52/index.html">
          <span>
            <span class="brand">XTRIKE ME</span>
            <span class="name">GP-52 Wireless Controller</span>
          </span>
          <span class="meta"><span>Open product</span><span>-&gt;</span></span>
        </a>
      </section>
    </div>
  </main>
</body>
</html>
